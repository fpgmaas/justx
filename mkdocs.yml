site_name: justx
repo_url: https://github.com/fpgmaas/justx
site_url: https://fpgmaas.github.io/justx
site_description: This is a template repository for Python projects that use uv for their dependency management.
site_author: Florian Maas
edit_uri: edit/main/docs/
repo_name: fpgmaas/justx
copyright: Maintained by <a href="https://fpgmaas.com">fpgmaas</a>.

nav:
  - Home: index.md
  - Modules: modules.md
plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: ["src/justx"]
theme:
  name: material
  feature:
    tabs: true
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/fpgmaas/justx
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/justx

markdown_extensions:
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
